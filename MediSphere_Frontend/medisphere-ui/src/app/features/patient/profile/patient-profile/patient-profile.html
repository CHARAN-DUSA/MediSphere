<!-- src/app/features/patient/profile/patient-profile/patient-profile.component.html -->
<div class="tab-content ms-card">
  <h2>Profile & Family Members</h2>
  <form [formGroup]="profileForm" (ngSubmit)="onUpdateProfile()" class="profile-form">
    <div class="form-grid">
      <div class="field"><label>First Name</label><input type="text" formControlName="firstName" /></div>
      <div class="field"><label>Last Name</label><input type="text" formControlName="lastName" /></div>
      <div class="field"><label>Phone Number</label><input type="text" formControlName="phoneNumber" /></div>
      <div class="field"><label>Blood Group</label><input type="text" formControlName="bloodGroup" /></div>
    </div>
    <div class="field"><label>Address</label><input type="text" formControlName="address" /></div>
    <div class="field">
      <label>Medical History Notes</label>
      <textarea formControlName="medicalHistory" placeholder="Chronic illnesses, surgeries, drug allergies..."></textarea>
    </div>

    <div class="family-section">
      <h3>Family Members</h3>
      <div class="family-list">
        <div *ngFor="let member of familyMembers()" class="family-member-row">
          <span>{{ member.name }} ({{ member.relation }}, {{ member.age }} yrs)</span>
          <button type="button" class="remove-member-btn" (click)="removeFamilyMember(member)">Delete</button>
        </div>
      </div>
      <div class="add-member-card">
        <h4>Add Family Member</h4>
        <div class="member-fields">
          <input type="text" [(ngModel)]="newMemberName" [ngModelOptions]="{standalone: true}" placeholder="Name" />
          <select [(ngModel)]="newMemberRelation" [ngModelOptions]="{standalone: true}">
            <option value="">Relation</option>
            <option value="Spouse">Spouse</option>
            <option value="Child">Child</option>
            <option value="Parent">Parent</option>
            <option value="Sibling">Sibling</option>
          </select>
          <input type="number" [(ngModel)]="newMemberAge" [ngModelOptions]="{standalone: true}" placeholder="Age" />
        </div>
        <div class="add-member-actions">
          <button type="button" class="ms-btn-primary add-member-btn" (click)="addFamilyMember()">+ Add Member</button>
        </div>
      </div>
    </div>

    <button type="submit" class="ms-btn-primary save-btn">Save Profile Changes</button>
  </form>
</div>
