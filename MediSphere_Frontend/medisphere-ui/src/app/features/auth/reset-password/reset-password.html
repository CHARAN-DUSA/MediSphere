<div class="auth-wrap">
  <div class="auth-card ms-card">
    <div class="auth-header">
      <span class="auth-icon"><ms-icon name="key" size="xl" ariaLabel="Reset password"></ms-icon></span>
      <h2>Reset Password</h2>
      <p>Please enter the verification token and your new secure password.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Email Address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
        />
        <span
          class="err"
          *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
        >
          Valid email is required.
        </span>
      </div>

      <div class="field">
        <label>OTP</label>

        <input
          type="text"
          formControlName="otp"
          maxlength="6"
          placeholder="Enter 6-digit OTP"
        />

        <span
          class="err"
          *ngIf="form.get('otp')?.invalid && form.get('otp')?.touched"
        >
          OTP is required.
        </span>

        <div class="otp-actions">
          <button
            type="button"
            class="resend-btn"
            (click)="resendOtp()"
            [disabled]="resendLoading"
          >
            {{ resendLoading ? 'Sending...' : 'Resend OTP' }}
          </button>
        </div>
      </div>

      <div class="field">
        <label>New Password</label>

        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="newPassword"
            placeholder="••••••••"
          />

          <button
            type="button"
            class="password-toggle"
            (click)="showPassword = !showPassword"
          >
            <ms-icon [name]="showPassword ? 'visibility_off' : 'visibility'" size="md" [attr.ariaLabel]="showPassword ? 'Hide password' : 'Show password'"></ms-icon>
          </button>
        </div>

        <span
          class="err"
          *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched"
        >
          Password must contain uppercase, lowercase, number and special
          character.
        </span>
      </div>

      <button
        type="submit"
        class="ms-btn-primary submit-btn"
        [disabled]="loading"
      >
        {{ loading ? 'Resetting password...' : 'Update Password' }}
      </button>
    </form>

    <p class="auth-footer">
      Remembered your password? <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
