<div class="auth-wrap">
  <div class="auth-card ms-card">
    <div class="auth-header">
      <span class="auth-icon"
        ><ms-icon
          name="medical_services"
          size="xl"
          ariaLabel="MediSphere"
        ></ms-icon
      ></span>
      <h2>Create Account</h2>
      <p>Join MediSphere Healthcare Platform</p>
    </div>

    <div class="role-selector">
      <button
        type="button"
        [class.active]="selectedRole === 'Patient'"
        (click)="setRole('Patient')"
      >
        Register as Patient
      </button>
      <button
        type="button"
        [class.active]="selectedRole === 'Doctor'"
        (click)="setRole('Doctor')"
      >
        Register as Doctor
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="row-2">
        <div class="field">
          <label>First Name</label>
          <input formControlName="firstName" placeholder="First Name" />
        </div>
        <div class="field">
          <label>Last Name</label>
          <input formControlName="lastName" placeholder="Last Name" />
        </div>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
        />
      </div>
      <div class="field">
        <label>Password</label>

        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Min 8 chars, A-Z, 0-9, special"
          />

          <button
            type="button"
            class="password-toggle"
            (click)="showPassword = !showPassword"
          >
            <ms-icon
              [name]="showPassword ? 'visibility_off' : 'visibility'"
              size="md"
              [attr.ariaLabel]="showPassword ? 'Hide password' : 'Show password'"
            ></ms-icon>
          </button>
        </div>

        <span
          class="err"
          *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
        >
          Password must have uppercase, lowercase, number and special character
          (min 8 chars).
        </span>
      </div>

      <div class="row-2">
        <div class="field">
          <label>Phone Number</label>
          <input formControlName="phoneNumber" placeholder="+91XXXXXXXXXX" />
        </div>
        <div class="field">
          <label>Gender</label>
          <select formControlName="gender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <!-- Patient Specific Fields -->
      <div *ngIf="selectedRole === 'Patient'">
        <div class="row-2">
          <div class="field">
            <label>Date of Birth</label>
            <input type="date" formControlName="dateOfBirth" />
          </div>
          <div class="field">
            <label>Blood Group</label>
            <select formControlName="bloodGroup">
              <option value="">Select Blood Group</option>
              <option *ngFor="let bg of bloodGroups" [value]="bg">
                {{ bg }}
              </option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Address</label>
          <input formControlName="address" placeholder="Your current address" />
        </div>
        <div class="field">
          <label>Referral Code (Optional)</label>
          <input
            formControlName="referralCode"
            placeholder="Enter referral code if any"
          />
        </div>
      </div>

      <!-- Doctor Specific Fields -->
      <div *ngIf="selectedRole === 'Doctor'">
        <div class="row-2">
          <div class="field">
            <label>Specialty</label>
            <input
              formControlName="specialty"
              placeholder="e.g. Cardiologist"
            />
          </div>
          <div class="field">
            <label>Qualification</label>
            <input
              formControlName="qualification"
              placeholder="e.g. MBBS, MD"
            />
          </div>
        </div>
        <div class="row-3">
          <div class="field">
            <label>Experience (Years)</label>
            <input type="number" formControlName="experienceYears" />
          </div>
          <div class="field">
            <label>Consultation Fee</label>
            <input type="number" formControlName="consultationFee" />
          </div>
          <div class="field">
            <label>Department</label>
            <select formControlName="departmentId">
              <option value="">Select Department</option>

              <option *ngFor="let dept of departments" [value]="dept.id">
                {{ dept.name }}
              </option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Medical License Number</label>
          <input
            formControlName="medicalLicenseNumber"
            placeholder="Enter license number"
          />
        </div>
        <div class="field">
          <label>Bio / Description</label>
          <textarea
            formControlName="bio"
            rows="3"
            placeholder="Brief details about your practice..."
          ></textarea>
        </div>
        <div class="field">
          <label>Qualifications & License Document Link</label>
          <input
            formControlName="profileDocuments"
            placeholder="Doc URL or file name (e.g. license.pdf)"
          />
        </div>
      </div>

      <button
        type="submit"
        class="ms-btn-primary submit-btn"
        [disabled]="loading"
      >
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>
    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
