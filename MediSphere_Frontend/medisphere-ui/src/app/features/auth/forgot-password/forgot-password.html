 <div class="auth-wrap">
      <div class="auth-card ms-card">
        <div class="auth-header">
          <span class="auth-icon"><ms-icon name="lock" size="xl" ariaLabel="Forgot password"></ms-icon></span>
          <h2>Forgot Password</h2>
          <p>Enter your registered email address below, and we'll send you reset instructions.</p>
        </div>
        
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="field">
            <label>Email Address</label>
            <input type="email" formControlName="email" placeholder="you@example.com" />
            <span class="err" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
              Valid email is required.
            </span>
          </div>

          <p class="success-notice" *ngIf="sent()">
            If your email is registered, you will receive password reset instructions shortly.
          </p>

          <button type="submit" class="ms-btn-primary submit-btn" [disabled]="loading">
            {{ loading ? 'Sending request...' : 'Send Reset Link' }}
          </button>
        </form>
        
        <p class="auth-footer">Remembered your password? <a routerLink="/login">Sign In</a></p>
      </div>
    </div>
